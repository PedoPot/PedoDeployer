services:
  pedo-observer:
    build:
      context: ../PedObserver
      dockerfile: ./Dockerfile.dev
      target: dev
    container_name: pedo-observer
    ports:
      - "9340:3000"
    volumes:
      - ../PedObserver:/app:rw
      - /app/node_modules
    networks:
      - pedo-services-network

  pedo-connector:
    build:
      context: ../PedoConnector
      dockerfile: ./Dockerfile.dev
    container_name: pedo-connector
    environment:
      - PEDOCONTROLLER_API_URL=https://webhook.site/14762a4c-aca9-4677-b3f9-43ebe9daae5c
    ports:
      - "9341:9341"
    volumes:
      - ../PedoConnector/app:/code/app
    networks:
      - pedo-services-network
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "9341"]

  pedo-controller:
    build:
      context: ../PedoController
      dockerfile: ./Dockerfile.dev
    container_name: pedo-controller
    ports:
      - "9343:8000"
    volumes:
      - ../PedoController/PedoController:/app
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]
    networks:
      - pedo-services-network
    depends_on:
      - pedo-stocker

  pedo-stocker:
    image: postgres
    container_name: pedo-stocker
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: PedoStocker
    ports:
      - "5432:5432"
    networks:
      - pedo-services-network
    volumes:
      - postgres-data:/var/lib/postgresql/data

  pedo-hunter-api:
    build:
      context: ../PedoHunter
      dockerfile: Dockerfile.api  
    container_name: pedo-hunter-api
    ports:
      - "6969:80"
    environment:
      - OLLAMA_HOST=http://pedo-hunter-ollama:11434  # Points to the ollama service for chat
    depends_on:
      - pedo-hunter-ollama
    networks:
      - pedo-services-network

  pedo-hunter-ollama:
    build:
      context: ../PedoHunter
      dockerfile: Dockerfile.ai
    container_name: pedo-hunter-ai
    # For NVIDIA GPUs, use this :
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    ports:
      - "11469:11434"
    volumes:
      - ollama_data_haunter:/root/.ollama  # Persist Ollama models
    networks:
      - pedo-services-network
  
  pedo-meter-api:
    build:
      context: ../PedoMeter
      dockerfile: Dockerfile.api  
    container_name: pedo-meter-api
    ports:
      - "9342:80"
    environment:
      - OLLAMA_HOST=http://pedo-meter-ollama:11434  # Points to the ollama service for chat
    depends_on:
      - pedo-meter-ollama
    networks:
      - pedo-services-network

  pedo-meter-ollama:
    build:
      context: ../PedoMeter
      dockerfile: Dockerfile.ai
    container_name: pedo-meter-ai
    # For NVIDIA GPUs, use this :
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    ports:
      - "114:11434"
    volumes:
      - ollama_data_meter:/root/.ollama  # Persist Ollama models
    networks:
      - pedo-services-network

networks:
  pedo-services-network:
    driver: bridge

volumes:
  ollama_data_haunter:
  ollama_data_meter:
  postgres-data: